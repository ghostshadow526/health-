<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Register - health+</title>
   <link rel="shortcut icon" href="images/fevicon.ico.png" type="image/x-icon" />
   <link rel="stylesheet" href="css/bootstrap.min.css">
   <link rel="stylesheet" href="style.css">
   <link rel="stylesheet" href="css/custom.css">
   <link rel="stylesheet" href="css/font-awesome.min.css">
   <style>
      .register-container {
         min-height: 100vh;
         display: flex;
         align-items: center;
         justify-content: center;
         background: linear-gradient(135deg, #2895f1 0%, #0060b1 100%);
         padding: 40px 20px;
      }
      .register-box {
         background: white;
         border-radius: 10px;
         padding: 40px;
         box-shadow: 0 10px 40px rgba(0,0,0,0.2);
         max-width: 600px;
         width: 100%;
      }
      .register-box h2 {
         color: #0060b1;
         margin-bottom: 10px;
         font-weight: 600;
      }
      .register-box .subtitle {
         color: #666;
         margin-bottom: 30px;
      }
      .form-group {
         margin-bottom: 20px;
      }
      .form-group label {
         font-weight: 500;
         color: #333;
         margin-bottom: 8px;
         display: block;
      }
      .form-control, .form-select {
         height: 45px;
         border-radius: 5px;
         border: 1px solid #ddd;
         padding: 10px 15px;
      }
      .form-control:focus, .form-select:focus {
         border-color: #2895f1;
         box-shadow: 0 0 0 0.2rem rgba(40, 149, 241, 0.25);
      }
      .btn-register {
         width: 100%;
         height: 45px;
         background: #2895f1;
         border: none;
         color: white;
         font-weight: 600;
         border-radius: 5px;
         margin-top: 10px;
         transition: all 0.3s;
      }
      .btn-register:hover {
         background: #0060b1;
         transform: translateY(-2px);
         box-shadow: 0 5px 15px rgba(40, 149, 241, 0.3);
      }
      .login-link {
         text-align: center;
         margin-top: 20px;
         color: #666;
      }
      .login-link a {
         color: #2895f1;
         font-weight: 600;
         text-decoration: none;
      }
      .login-link a:hover {
         text-decoration: underline;
      }
      .logo-text {
         text-align: center;
         font-size: 36px;
         font-weight: 700;
         color: #2895f1;
         margin-bottom: 5px;
      }
      .alert {
         border-radius: 5px;
         padding: 12px;
         margin-bottom: 20px;
      }
      .row {
         margin-left: -10px;
         margin-right: -10px;
      }
      .col-md-6 {
         padding-left: 10px;
         padding-right: 10px;
      }
      .checkbox-group {
         display: flex;
         flex-wrap: wrap;
         gap: 10px;
      }
      .checkbox-group label {
         display: flex;
         align-items: center;
         margin: 0;
         padding: 8px 12px;
         background: #f5f5f5;
         border-radius: 5px;
         cursor: pointer;
         font-weight: 400;
      }
      .checkbox-group input[type="checkbox"] {
         margin-right: 8px;
      }
   </style>
</head>
<body>
   <div class="register-container">
      <div class="register-box">
         <div class="logo-text">health+</div>
         <h2>Create Account</h2>
         <p class="subtitle">Start monitoring your health today</p>
         
         <div id="alert-container"></div>
         
         <form id="registerForm">
            <div class="row">
               <div class="col-md-6">
                  <div class="form-group">
                     <label for="fullName">Full Name</label>
                     <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
                  </div>
               </div>
               <div class="col-md-6">
                  <div class="form-group">
                     <label for="age">Age</label>
                     <input type="number" class="form-control" id="age" placeholder="Your age" min="1" max="120" required>
                  </div>
               </div>
            </div>

            <div class="row">
               <div class="col-md-6">
                  <div class="form-group">
                     <label for="sex">Sex</label>
                     <select class="form-control form-select" id="sex" required>
                        <option value="">Select...</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                     </select>
                  </div>
               </div>
               <div class="col-md-6">
                  <div class="form-group">
                     <label for="email">Email Address</label>
                     <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                  </div>
               </div>
            </div>

            <div class="form-group">
               <label>Medical Condition(s)</label>
               <div class="checkbox-group">
                  <label>
                     <input type="checkbox" name="conditions" value="hypertension"> Hypertension
                  </label>
                  <label>
                     <input type="checkbox" name="conditions" value="diabetes"> Diabetes
                  </label>
                  <label>
                     <input type="checkbox" name="conditions" value="heart_disease"> Heart Disease
                  </label>
                  <label>
                     <input type="checkbox" name="conditions" value="other"> Other
                  </label>
               </div>
            </div>

            <div class="row">
               <div class="col-md-6">
                  <div class="form-group">
                     <label for="password">Password</label>
                     <input type="password" class="form-control" id="password" placeholder="Create password" minlength="6" required>
                  </div>
               </div>
               <div class="col-md-6">
                  <div class="form-group">
                     <label for="confirmPassword">Confirm Password</label>
                     <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password" minlength="6" required>
                  </div>
               </div>
            </div>

            <button type="submit" class="btn btn-register">Create Account</button>
         </form>
         
         <div class="login-link">
            Already have an account? <a href="login.html">Sign in here</a>
         </div>
      </div>
   </div>

   <script type="module">
      import { auth, db, createUserWithEmailAndPassword, doc, setDoc } from './js/firebase-config.js';

      const registerForm = document.getElementById('registerForm');
      const alertContainer = document.getElementById('alert-container');

      function showAlert(message, type = 'danger') {
         alertContainer.innerHTML = `
            <div class="alert alert-${type}" role="alert">
               ${message}
            </div>
         `;
         setTimeout(() => {
            alertContainer.innerHTML = '';
         }, 5000);
      }

      registerForm.addEventListener('submit', async (e) => {
         e.preventDefault();
         
         const fullName = document.getElementById('fullName').value;
         const age = document.getElementById('age').value;
         const sex = document.getElementById('sex').value;
         const email = document.getElementById('email').value;
         const password = document.getElementById('password').value;
         const confirmPassword = document.getElementById('confirmPassword').value;

         // Get selected conditions
         const conditionsCheckboxes = document.querySelectorAll('input[name="conditions"]:checked');
         const conditions = Array.from(conditionsCheckboxes).map(cb => cb.value);

         if (conditions.length === 0) {
            showAlert('Please select at least one medical condition.', 'warning');
            return;
         }

         if (password !== confirmPassword) {
            showAlert('Passwords do not match.', 'warning');
            return;
         }

         try {
            // Create user account
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // Save user profile to Firestore
            await setDoc(doc(db, 'users', user.uid), {
               fullName: fullName,
               age: parseInt(age),
               sex: sex,
               email: email,
               conditions: conditions,
               createdAt: new Date().toISOString()
            });

            showAlert('Account created successfully! Redirecting...', 'success');
            setTimeout(() => {
               window.location.href = 'dashboard.html';
            }, 1500);
         } catch (error) {
            let errorMessage = 'Registration failed. Please try again.';
            if (error.code === 'auth/email-already-in-use') {
               errorMessage = 'This email is already registered.';
            } else if (error.code === 'auth/invalid-email') {
               errorMessage = 'Invalid email address.';
            } else if (error.code === 'auth/weak-password') {
               errorMessage = 'Password should be at least 6 characters.';
            }
            showAlert(errorMessage, 'danger');
         }
      });
   </script>
</body>
</html>
