<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Login - health+</title>
   <link rel="shortcut icon" href="images/fevicon.ico.png" type="image/x-icon" />
   <link rel="stylesheet" href="css/bootstrap.min.css">
   <link rel="stylesheet" href="style.css">
   <link rel="stylesheet" href="css/custom.css">
   <link rel="stylesheet" href="css/font-awesome.min.css">
   <style>
      .login-container {
         min-height: 100vh;
         display: flex;
         align-items: center;
         justify-content: center;
         background: linear-gradient(135deg, #2895f1 0%, #0060b1 100%);
         padding: 20px;
      }
      .login-box {
         background: white;
         border-radius: 10px;
         padding: 40px;
         box-shadow: 0 10px 40px rgba(0,0,0,0.2);
         max-width: 450px;
         width: 100%;
      }
      .login-box h2 {
         color: #0060b1;
         margin-bottom: 10px;
         font-weight: 600;
      }
      .login-box .subtitle {
         color: #666;
         margin-bottom: 30px;
      }
      .form-group {
         margin-bottom: 20px;
      }
      .form-group label {
         font-weight: 500;
         color: #333;
         margin-bottom: 8px;
         display: block;
      }
      .form-control {
         height: 45px;
         border-radius: 5px;
         border: 1px solid #ddd;
         padding: 10px 15px;
      }
      .form-control:focus {
         border-color: #2895f1;
         box-shadow: 0 0 0 0.2rem rgba(40, 149, 241, 0.25);
      }
      .btn-login {
         width: 100%;
         height: 45px;
         background: #2895f1;
         border: none;
         color: white;
         font-weight: 600;
         border-radius: 5px;
         margin-top: 10px;
         transition: all 0.3s;
      }
      .btn-login:hover {
         background: #0060b1;
         transform: translateY(-2px);
         box-shadow: 0 5px 15px rgba(40, 149, 241, 0.3);
      }
      .divider {
         text-align: center;
         margin: 25px 0;
         color: #999;
      }
      .register-link {
         text-align: center;
         margin-top: 20px;
         color: #666;
      }
      .register-link a {
         color: #2895f1;
         font-weight: 600;
         text-decoration: none;
      }
      .register-link a:hover {
         text-decoration: underline;
      }
      .logo-text {
         text-align: center;
         font-size: 36px;
         font-weight: 700;
         color: #2895f1;
         margin-bottom: 5px;
      }
      .alert {
         border-radius: 5px;
         padding: 12px;
         margin-bottom: 20px;
      }
   </style>
</head>
<body>
   <div class="login-container">
      <div class="login-box">
         <div class="logo-text">health+</div>
         <h2>Welcome Back</h2>
         <p class="subtitle">Sign in to continue to your dashboard</p>
         
         <div id="alert-container"></div>
         
         <form id="loginForm">
            <div class="form-group">
               <label for="email">Email Address</label>
               <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
               <label for="password">Password</label>
               <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-login">Sign In</button>
         </form>
         
         <div class="register-link">
            Don't have an account? <a href="register.html">Sign up here</a>
         </div>
      </div>
   </div>

   <script type="module">
      import { auth, signInWithEmailAndPassword } from './js/firebase-config.js';

      const loginForm = document.getElementById('loginForm');
      const alertContainer = document.getElementById('alert-container');

      function showAlert(message, type = 'danger') {
         alertContainer.innerHTML = `
            <div class="alert alert-${type}" role="alert">
               ${message}
            </div>
         `;
         setTimeout(() => {
            alertContainer.innerHTML = '';
         }, 5000);
      }

      loginForm.addEventListener('submit', async (e) => {
         e.preventDefault();
         
         const email = document.getElementById('email').value;
         const password = document.getElementById('password').value;

         try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            showAlert('Login successful! Redirecting...', 'success');
            setTimeout(() => {
               window.location.href = 'dashboard.html';
            }, 1000);
         } catch (error) {
            let errorMessage = 'Login failed. Please try again.';
            if (error.code === 'auth/user-not-found') {
               errorMessage = 'No account found with this email.';
            } else if (error.code === 'auth/wrong-password') {
               errorMessage = 'Incorrect password.';
            } else if (error.code === 'auth/invalid-email') {
               errorMessage = 'Invalid email address.';
            }
            showAlert(errorMessage, 'danger');
         }
      });
   </script>
</body>
</html>
