<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Login - health+</title>
   <link rel="shortcut icon" href="images/fevicon.ico.png" type="image/x-icon" />
   <link rel="stylesheet" href="css/bootstrap.min.css">
   <link rel="stylesheet" href="style.css">
   <link rel="stylesheet" href="css/custom.css">
   <link rel="stylesheet" href="css/font-awesome.min.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
   <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

      /* ─── Layout ─── */
      .login-container {
         min-height: 100vh;
         display: flex;
      }

      /* ─── Left: brand panel ─── */
      .login-brand-panel {
         flex: 1;
         background: linear-gradient(150deg, #1a73e8 0%, #0049a3 100%);
         display: flex;
         align-items: center;
         justify-content: center;
         padding: 60px 50px;
         position: relative;
         overflow: hidden;
      }
      .login-brand-panel::before {
         content: '';
         position: absolute;
         width: 480px; height: 480px;
         border-radius: 50%;
         background: rgba(255,255,255,0.06);
         top: -140px; left: -140px;
      }
      .login-brand-panel::after {
         content: '';
         position: absolute;
         width: 320px; height: 320px;
         border-radius: 50%;
         background: rgba(255,255,255,0.06);
         bottom: -90px; right: -90px;
      }
      .brand-content { position: relative; z-index: 1; max-width: 380px; }
      .brand-logo {
         display: flex; align-items: center; gap: 14px;
         margin-bottom: 40px;
      }
      .brand-logo-icon {
         width: 54px; height: 54px;
         background: rgba(255,255,255,0.18);
         border-radius: 16px;
         display: flex; align-items: center; justify-content: center;
         font-size: 24px; color: white;
         backdrop-filter: blur(6px);
      }
      .brand-logo-text {
         font-size: 28px; font-weight: 700; color: white; letter-spacing: -0.5px;
      }
      .brand-content h2 {
         font-size: 28px; font-weight: 700; color: white;
         line-height: 1.35; margin-bottom: 14px;
      }
      .brand-content p {
         font-size: 15px; color: rgba(255,255,255,0.75);
         line-height: 1.75; margin-bottom: 44px;
      }
      .brand-stats { display: flex; gap: 36px; }
      .brand-stat-value {
         display: block; font-size: 26px; font-weight: 700; color: white;
      }
      .brand-stat-label {
         font-size: 13px; color: rgba(255,255,255,0.6);
      }

      /* ─── Right: form panel ─── */
      .login-form-panel {
         width: 500px;
         flex-shrink: 0;
         background: #ffffff;
         display: flex;
         align-items: center;
         justify-content: center;
         padding: 60px 52px;
      }
      .login-box { width: 100%; max-width: 380px; }

      .form-header { margin-bottom: 36px; }
      .form-header h2 {
         font-size: 26px; font-weight: 700; color: #111827; margin-bottom: 6px;
      }
      .form-header .subtitle { color: #6b7280; font-size: 14px; line-height: 1.5; }

      /* ─── Form elements ─── */
      .form-group { margin-bottom: 20px; }
      .form-group label {
         display: block;
         font-size: 13px; font-weight: 600; color: #374151;
         margin-bottom: 7px; letter-spacing: 0.01em;
      }
      .input-wrapper { position: relative; }
      .input-wrapper .input-icon {
         position: absolute; left: 14px; top: 50%;
         transform: translateY(-50%);
         color: #9ca3af; font-size: 14px; pointer-events: none;
      }
      .input-wrapper .form-control { padding-left: 42px; }
      .form-control {
         display: block; width: 100%; height: 46px;
         border: 1.5px solid #e5e7eb;
         border-radius: 8px;
         padding: 10px 14px;
         font-size: 14px; color: #111827;
         background: #f9fafb;
         transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
         outline: none;
      }
      .form-control:focus {
         border-color: #1a73e8;
         background: #fff;
         box-shadow: 0 0 0 3px rgba(26,115,232,0.13);
      }

      /* ─── Button ─── */
      .btn-login {
         display: block; width: 100%; height: 46px;
         background: #1a73e8;
         border: none; color: white;
         font-family: 'Inter', sans-serif;
         font-size: 15px; font-weight: 600;
         border-radius: 8px; cursor: pointer;
         margin-top: 8px;
         transition: background 0.18s, box-shadow 0.18s, transform 0.15s;
         letter-spacing: 0.02em;
      }
      .btn-login:hover {
         background: #1558b0;
         box-shadow: 0 4px 14px rgba(26,115,232,0.35);
         transform: translateY(-1px);
      }
      .btn-login:active { transform: translateY(0); }

      /* ─── Alert ─── */
      .alert { border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; font-size: 14px; border: none; }
      .alert-danger { background: #fef2f2; color: #991b1b; }
      .alert-success { background: #f0fdf4; color: #166534; }

      /* ─── Footer ─── */
      .register-link {
         text-align: center; margin-top: 26px;
         color: #6b7280; font-size: 14px;
      }
      .register-link a { color: #1a73e8; font-weight: 600; text-decoration: none; }
      .register-link a:hover { text-decoration: underline; }

      .form-divider { height: 1px; background: #f3f4f6; margin: 28px 0; }

      /* ─── Mobile ─── */
      @media (max-width: 900px) {
         .login-brand-panel { display: none; }
         .login-form-panel { width: 100%; min-height: 100vh; padding: 52px 36px; }
      }
      @media (max-width: 480px) {
         .login-form-panel { padding: 36px 20px; }
         .form-header h2 { font-size: 22px; }
      }
      @media (max-width: 360px) {
         .login-form-panel { padding: 28px 16px; }
         .form-header h2 { font-size: 20px; }
      }

      /* ═══════════════════════════════
         ANIMATIONS
      ═══════════════════════════════ */

      /* Keyframes */
      @keyframes slideInLeft {
         from { opacity: 0; transform: translateX(-40px); }
         to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideInRight {
         from { opacity: 0; transform: translateX(40px); }
         to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes fadeSlideUp {
         from { opacity: 0; transform: translateY(22px); }
         to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes float {
         0%, 100% { transform: translateY(0) scale(1); }
         50%       { transform: translateY(-18px) scale(1.04); }
      }
      @keyframes pulse {
         0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
         50%       { transform: scale(1.12); box-shadow: 0 0 0 10px rgba(255,255,255,0); }
      }
      @keyframes shimmer {
         0%   { background-position: -200% center; }
         100% { background-position:  200% center; }
      }
      @keyframes borderGlow {
         0%, 100% { box-shadow: 0 0 0 3px rgba(26,115,232,0.13); }
         50%       { box-shadow: 0 0 0 5px rgba(26,115,232,0.22); }
      }

      /* Panel entrances */
      .login-brand-panel {
         animation: slideInLeft 0.7s cubic-bezier(0.22,1,0.36,1) both;
      }
      .login-form-panel {
         animation: slideInRight 0.7s cubic-bezier(0.22,1,0.36,1) 0.1s both;
      }

      /* Floating background orbs */
      .login-brand-panel::before {
         animation: float 7s ease-in-out infinite;
      }
      .login-brand-panel::after {
         animation: float 9s ease-in-out 1.5s infinite;
      }

      /* Brand logo icon heartbeat pulse */
      .brand-logo-icon {
         animation: pulse 2.4s ease-in-out infinite;
      }

      /* Staggered form content fade-up */
      .form-header {
         animation: fadeSlideUp 0.55s cubic-bezier(0.22,1,0.36,1) 0.35s both;
      }
      #alert-container {
         animation: fadeSlideUp 0.55s cubic-bezier(0.22,1,0.36,1) 0.45s both;
      }
      .form-group:nth-child(1) {
         animation: fadeSlideUp 0.55s cubic-bezier(0.22,1,0.36,1) 0.50s both;
      }
      .form-group:nth-child(2) {
         animation: fadeSlideUp 0.55s cubic-bezier(0.22,1,0.36,1) 0.62s both;
      }
      .btn-login {
         animation: fadeSlideUp 0.55s cubic-bezier(0.22,1,0.36,1) 0.74s both;
      }
      .register-link {
         animation: fadeSlideUp 0.45s cubic-bezier(0.22,1,0.36,1) 0.85s both;
      }

      /* Brand stats stagger */
      .brand-stat-value {
         animation: fadeSlideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.9s both;
      }

      /* Input focus — continuous glow pulse */
      .form-control:focus {
         animation: borderGlow 1.8s ease-in-out infinite;
      }

      /* Input wrapper icon colour shift on sibling focus */
      .input-wrapper .form-control:focus ~ .input-icon,
      .input-wrapper:focus-within .input-icon {
         color: #1a73e8;
         transition: color 0.2s;
      }

      /* Button shimmer on hover */
      .btn-login:hover {
         background: linear-gradient(90deg,
            #1a73e8 0%, #3b8ef0 40%, #1a73e8 60%, #1558b0 100%);
         background-size: 200% auto;
         animation: shimmer 1.2s linear infinite;
      }

      /* Input float label lift — scale on focus */
      .input-wrapper .form-control:focus {
         transform: scale(1.012);
         transition: transform 0.18s ease, border-color 0.18s, box-shadow 0.18s, background 0.18s;
      }
   </style>
</head>
<body>
   <div class="login-container">

      <!-- ── Brand panel (left) ── -->
      <div class="login-brand-panel">
         <div class="brand-content">
            <div class="brand-logo">
               <div class="brand-logo-icon"><i class="fa fa-heartbeat"></i></div>
               <span class="brand-logo-text">health+</span>
            </div>
            <h2>Monitor your health.<br>Live with confidence.</h2>
            <p>Track vitals, manage chronic conditions, and receive AI‑powered insights — all from one dashboard.</p>
            <div class="brand-stats">
               <div>
                  <span class="brand-stat-value">10k+</span>
                  <span class="brand-stat-label">Patients</span>
               </div>
               <div>
                  <span class="brand-stat-value">50+</span>
                  <span class="brand-stat-label">Conditions</span>
               </div>
               <div>
                  <span class="brand-stat-value">24/7</span>
                  <span class="brand-stat-label">Monitoring</span>
               </div>
            </div>
         </div>
      </div>

      <!-- ── Form panel (right) ── -->
      <div class="login-form-panel">
         <div class="login-box">
            <div class="form-header">
               <h2>Welcome back</h2>
               <p class="subtitle">Sign in to continue to your dashboard</p>
            </div>

            <div id="alert-container"></div>

            <form id="loginForm">
               <div class="form-group">
                  <label for="email">Email Address</label>
                  <div class="input-wrapper">
                     <i class="fa fa-envelope input-icon"></i>
                     <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
                  </div>
               </div>
               <div class="form-group">
                  <label for="password">Password</label>
                  <div class="input-wrapper">
                     <i class="fa fa-lock input-icon"></i>
                     <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                  </div>
               </div>
               <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="register-link">
               Don't have an account? <a href="register.html">Create one</a>
            </div>
         </div>
      </div>

   </div>

   <script type="module">
      import { auth, signInWithEmailAndPassword } from './js/firebase-config.js';

      const loginForm = document.getElementById('loginForm');
      const alertContainer = document.getElementById('alert-container');

      function showAlert(message, type = 'danger') {
         alertContainer.innerHTML = `
            <div class="alert alert-${type}" role="alert">
               ${message}
            </div>
         `;
         setTimeout(() => {
            alertContainer.innerHTML = '';
         }, 5000);
      }

      loginForm.addEventListener('submit', async (e) => {
         e.preventDefault();
         
         const email = document.getElementById('email').value;
         const password = document.getElementById('password').value;

         try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            showAlert('Login successful! Redirecting...', 'success');
            setTimeout(() => {
               window.location.href = 'dashboard.html';
            }, 1000);
         } catch (error) {
            let errorMessage = 'Login failed. Please try again.';
            if (error.code === 'auth/user-not-found') {
               errorMessage = 'No account found with this email.';
            } else if (error.code === 'auth/wrong-password') {
               errorMessage = 'Incorrect password.';
            } else if (error.code === 'auth/invalid-email') {
               errorMessage = 'Invalid email address.';
            }
            showAlert(errorMessage, 'danger');
         }
      });
   </script>
</body>
</html>
