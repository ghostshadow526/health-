<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Chart Test - health+</title>
   <style>
      body {
         font-family: Arial, sans-serif;
         max-width: 1200px;
         margin: 40px auto;
         padding: 20px;
         background: #f5f7fa;
      }
      h1 {
         color: #2895f1;
      }
      .chart-container {
         background: white;
         padding: 20px;
         margin: 20px 0;
         border-radius: 10px;
         box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      canvas {
         max-width: 100%;
      }
      .status {
         padding: 15px;
         margin: 10px 0;
         border-radius: 5px;
         font-weight: bold;
      }
      .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
      .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
      .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
   </style>
</head>
<body>
   <h1>🧪 Chart.js Test Page</h1>
   <p>This page tests if Chart.js is working correctly</p>

   <div id="status"></div>

   <div class="chart-container">
      <h3>Test Chart 1: Simple Line Chart</h3>
      <canvas id="testChart1"></canvas>
   </div>

   <div class="chart-container">
      <h3>Test Chart 2: Blood Pressure Simulation</h3>
      <canvas id="testChart2"></canvas>
   </div>

   <!-- Load Chart.js from CDN -->
   <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

   <script>
      const statusDiv = document.getElementById('status');

      // Check if Chart.js loaded
      if (typeof Chart !== 'undefined') {
         statusDiv.innerHTML = '<div class="status success">✅ Chart.js loaded successfully! Version: ' + Chart.version + '</div>';
         
         try {
            // Test Chart 1: Simple line chart
            const ctx1 = document.getElementById('testChart1').getContext('2d');
            new Chart(ctx1, {
               type: 'line',
               data: {
                  labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                  datasets: [{
                     label: 'Sample Data',
                     data: [12, 19, 3, 5, 2, 3, 7],
                     borderColor: '#2895f1',
                     backgroundColor: 'rgba(40, 149, 241, 0.1)',
                     borderWidth: 2,
                     tension: 0.4
                  }]
               },
               options: {
                  responsive: true,
                  plugins: {
                     title: {
                        display: true,
                        text: 'Simple Test Chart'
                     }
                  }
               }
            });

            // Test Chart 2: BP simulation
            const ctx2 = document.getElementById('testChart2').getContext('2d');
            new Chart(ctx2, {
               type: 'line',
               data: {
                  labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5'],
                  datasets: [
                     {
                        label: 'Systolic',
                        data: [120, 118, 122, 119, 121],
                        borderColor: '#e74c3c',
                        backgroundColor: 'rgba(231, 76, 60, 0.1)',
                        borderWidth: 2,
                        pointRadius: 5,
                        tension: 0.4
                     },
                     {
                        label: 'Diastolic',
                        data: [80, 78, 82, 79, 81],
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52, 152, 219, 0.1)',
                        borderWidth: 2,
                        pointRadius: 5,
                        tension: 0.4
                     }
                  ]
               },
               options: {
                  responsive: true,
                  plugins: {
                     title: {
                        display: true,
                        text: 'Blood Pressure Simulation'
                     }
                  },
                  scales: {
                     y: {
                        beginAtZero: false,
                        min: 60,
                        max: 140
                     }
                  }
               }
            });

            statusDiv.innerHTML += '<div class="status success">✅ Charts rendered successfully!</div>';
            
         } catch (error) {
            statusDiv.innerHTML += '<div class="status error">❌ Error creating charts: ' + error.message + '</div>';
            console.error('Chart error:', error);
         }
      } else {
         statusDiv.innerHTML = '<div class="status error">❌ Chart.js failed to load!</div>';
      }

      // Log debugging info
      console.log('Chart.js available:', typeof Chart !== 'undefined');
      console.log('Canvas elements found:', document.querySelectorAll('canvas').length);
   </script>
</body>
</html>
